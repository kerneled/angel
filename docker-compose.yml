services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8030:8000"
    volumes:
      - ./data:/app/data
      - hf_cache:/app/models
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s  # Wav2Vec2 download on first run

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3030:3000"
    env_file:
      - .env
    restart: always
    depends_on:
      api:
        condition: service_healthy

volumes:
  hf_cache:
